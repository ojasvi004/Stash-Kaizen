name: mobile
description: "Stash — Admin AI Chatbot for Godown Management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.1

  # Storage & Auth
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Voice & Audio
  record: 5.0.0
  just_audio: ^0.9.40
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # File Picking
  file_picker: ^8.1.3

  # UI Enhancements
  fl_chart: ^0.68.0
  flutter_markdown: ^0.7.4
  google_fonts: ^8.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.19.0
  path: ^1.9.0
  mime: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  record_linux:
    path: ./record_linux_mock

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
